<!DOCTYPE html>
<html lang="ru" data-theme="auto">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SemkaMes</title>
  <style>
    :root {
      --accent: #6C63FF;
      --accent-2: #4F46E5;
      --accent-soft: rgba(108,99,255,0.12);
      --accent-glow: rgba(108,99,255,0.25);

      --bg: #f5f5f7;
      --bg-panel: #ffffff;
      --bg-input: #f0f0f5;
      --bg-hover: #eeeef6;
      --bg-msg-in: #ffffff;
      --bg-msg-out: #6C63FF;

      --text: #1a1a2e;
      --text-2: #5a5a7a;
      --text-3: #9494b0;
      --text-msg-out: #ffffff;

      --border: rgba(0,0,0,0.07);
      --shadow: 0 2px 16px rgba(108,99,255,0.07);
      --shadow-md: 0 4px 32px rgba(108,99,255,0.13);

      --radius: 14px;
      --radius-sm: 8px;
      --sidebar-w: 64px;
      --dialogs-w: 300px;
      --transition: 0.18s ease;
    }

    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg: #0f0f17;
        --bg-panel: #16161f;
        --bg-input: #1e1e2a;
        --bg-hover: #1e1e2e;
        --bg-msg-in: #1e1e2a;
        --bg-msg-out: #6C63FF;

        --text: #e8e8f4;
        --text-2: #9090b8;
        --text-3: #5a5a7a;
        --text-msg-out: #ffffff;

        --border: rgba(255,255,255,0.06);
        --shadow: 0 2px 16px rgba(0,0,0,0.4);
        --shadow-md: 0 4px 32px rgba(0,0,0,0.5);
      }
    }
    html[data-theme="dark"] {
      --bg: #0f0f17;
      --bg-panel: #16161f;
      --bg-input: #1e1e2a;
      --bg-hover: #1e1e2e;
      --bg-msg-in: #1e1e2a;
      --text: #e8e8f4;
      --text-2: #9090b8;
      --text-3: #5a5a7a;
      --border: rgba(255,255,255,0.06);
      --shadow: 0 2px 16px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 32px rgba(0,0,0,0.5);
    }
    html[data-theme="light"] {
      --bg: #f5f5f7;
      --bg-panel: #ffffff;
      --bg-input: #f0f0f5;
      --bg-hover: #eeeef6;
      --bg-msg-in: #ffffff;
      --text: #1a1a2e;
      --text-2: #5a5a7a;
      --text-3: #9494b0;
      --border: rgba(0,0,0,0.07);
      --shadow: 0 2px 16px rgba(108,99,255,0.07);
      --shadow-md: 0 4px 32px rgba(108,99,255,0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ── SIDEBAR NAV ── */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      z-index: 10;
      flex-shrink: 0;
    }
    .sidebar-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 20px;
      flex-shrink: 0;
    }
    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-3);
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .nav-btn:hover { background: var(--bg-hover); color: var(--text-2); }
    .nav-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .nav-btn .badge {
      position: absolute;
      top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: #FF4757;
      border-radius: 50%;
      border: 2px solid var(--bg-panel);
    }
    .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .avatar-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: white;
      font-weight: 600;
    }

    /* ── PAGES ── */
    .page { display: none; flex: 1; overflow: hidden; }
    .page.active { display: flex; }

    /* ══ MESSENGER PAGE ══ */
    .dialogs-panel {
      width: var(--dialogs-w);
      height: 100vh;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .dialogs-header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dialogs-header h2 { font-size: 18px; font-weight: 600; }
    .new-chat-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: none; cursor: pointer;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
    }
    .new-chat-btn:hover { background: var(--accent-glow); }

    .search-wrap { padding: 0 12px 12px; }
    .search-input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition);
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-3); }

    .dialogs-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .dialogs-list::-webkit-scrollbar { width: 4px; }
    .dialogs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .dialog-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .dialog-item:hover { background: var(--bg-hover); }
    .dialog-item.active { background: var(--accent-soft); }
    .dialog-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      font-weight: 600; color: white;
    }
    .dialog-info { flex: 1; min-width: 0; }
    .dialog-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dialog-preview { font-size: 13px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .dialog-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .dialog-time { font-size: 11px; color: var(--text-3); }
    .dialog-unread {
      min-width: 18px; height: 18px;
      background: var(--accent);
      color: white; font-size: 11px; font-weight: 600;
      border-radius: 9px; padding: 0 5px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .chat-topbar {
      height: 62px;
      padding: 0 20px;
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-topbar-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; color: white; }
    .chat-topbar-name { font-size: 15px; font-weight: 600; }
    .chat-topbar-status { font-size: 12px; color: #22c55e; margin-top: 1px; }
    .chat-topbar-actions { margin-left: auto; display: flex; gap: 4px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 8px; border: none; background: transparent;
      color: var(--text-3); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-2); }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-placeholder {
      margin: auto; text-align: center; color: var(--text-3); font-size: 15px;
    }
    .msg-placeholder span { font-size: 40px; display: block; margin-bottom: 12px; }

    .msg-day {
      text-align: center; font-size: 12px; color: var(--text-3);
      padding: 8px 0; position: relative;
    }
    .msg-day::before {
      content: '';
      position: absolute; left: 0; right: 0; top: 50%;
      height: 1px; background: var(--border);
    }
    .msg-day span { background: var(--bg); padding: 0 12px; position: relative; }

    .msg-wrap { display: flex; gap: 8px; max-width: 68%; }
    .msg-wrap.out { align-self: flex-end; flex-direction: row-reverse; }
    .msg-wrap.in { align-self: flex-start; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px; line-height: 1.5;
      max-width: 100%;
      box-shadow: var(--shadow);
    }
    .msg-wrap.in .msg-bubble {
      background: var(--bg-msg-in);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg-wrap.out .msg-bubble {
      background: var(--bg-msg-out);
      color: var(--text-msg-out);
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 11px; margin-top: 4px; opacity: 0.6; text-align: right; }
    .msg-wrap.in .msg-time { text-align: left; color: var(--text-3); }
    .msg-small-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      align-self: flex-end; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 600; flex-shrink: 0;
    }

    .chat-input-bar {
      padding: 12px 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1; padding: 10px 16px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text); font-size: 14px;
      outline: none;
      transition: border-color var(--transition);
    }
    .msg-input:focus { border-color: var(--accent); }
    .msg-input::placeholder { color: var(--text-3); }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%; border: none;
      background: var(--accent); color: white;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), transform var(--transition);
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent-2); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.96); }

    /* ══ NEWS PAGE ══ */
    .news-page { flex: 1; display: flex; overflow: hidden; }
    .news-sidebar {
      width: 240px; flex-shrink: 0;
      padding: 20px 12px;
      border-right: 1px solid var(--border);
      background: var(--bg-panel);
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .news-sidebar h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); padding: 4px 8px; margin-top: 4px; }
    .news-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 10px;
      cursor: pointer; font-size: 14px; color: var(--text-2);
      transition: background var(--transition), color var(--transition);
    }
    .news-nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .news-nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .news-nav-item span { font-size: 17px; }

    .stats-block { padding: 12px; border-radius: 12px; background: var(--bg-input); margin-top: 4px; }
    .stats-block h4 { font-size: 12px; font-weight: 600; color: var(--text-3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    .stat-val { font-weight: 600; color: var(--accent); }

    .groups-block { display: flex; flex-direction: column; gap: 4px; }
    .group-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background var(--transition); font-size: 13px; }
    .group-row:hover { background: var(--bg-hover); }
    .group-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

    .news-feed {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 16px;
      max-width: 680px;
    }
    .news-feed::-webkit-scrollbar { width: 4px; }
    .news-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .feed-topbar { display: flex; align-items: center; justify-content: space-between; }
    .feed-topbar h2 { font-size: 20px; font-weight: 700; }
    .feed-tabs { display: flex; gap: 4px; }
    .feed-tab {
      padding: 6px 14px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer; font-size: 13px;
      color: var(--text-3); transition: background var(--transition), color var(--transition);
    }
    .feed-tab:hover { background: var(--bg-hover); color: var(--text-2); }
    .feed-tab.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

    .create-post {
      background: var(--bg-panel);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .create-post-top { display: flex; align-items: center; gap: 12px; }
    .post-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a78bfa); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 16px; flex-shrink: 0; }
    .post-input {
      flex: 1; padding: 10px 14px; border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--bg-input); color: var(--text);
      font-size: 14px; outline: none; cursor: pointer;
      transition: border-color var(--transition);
    }
    .post-input:focus { border-color: var(--accent); cursor: text; }
    .post-input::placeholder { color: var(--text-3); }
    .create-post-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .post-action-btns { display: flex; gap: 4px; }
    .post-act-btn { padding: 7px 12px; border-radius: 8px; border: none; background: transparent; color: var(--text-3); font-size: 13px; cursor: pointer; transition: background var(--transition), color var(--transition); }
    .post-act-btn:hover { background: var(--bg-hover); color: var(--text-2); }
    .publish-btn {
      padding: 8px 18px; border-radius: 8px; border: none;
      background: var(--accent); color: white; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background var(--transition);
    }
    .publish-btn:hover { background: var(--accent-2); }

    .post-card {
      background: var(--bg-panel);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow var(--transition);
    }
    .post-card:hover { box-shadow: var(--shadow-md); }
    .post-card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 12px; }
    .post-user-info { display: flex; align-items: center; gap: 10px; }
    .post-user-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .post-user-name { font-size: 14px; font-weight: 600; }
    .post-time { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .post-menu-btn { background: transparent; border: none; color: var(--text-3); font-size: 20px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
    .post-menu-btn:hover { background: var(--bg-hover); }
    .post-body { padding: 0 16px 12px; font-size: 14px; line-height: 1.6; color: var(--text); }
    .post-media { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .post-footer { display: flex; gap: 4px; padding: 8px 10px; border-top: 1px solid var(--border); }
    .react-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 8px; border: none;
      background: transparent; color: var(--text-3); font-size: 13px;
      cursor: pointer; transition: background var(--transition), color var(--transition);
    }
    .react-btn:hover { background: var(--bg-hover); color: var(--text); }
    .react-btn.liked { color: #FF4757; background: rgba(255,71,87,0.08); }

    /* ── THEME TOGGLE ── */
    .theme-btn {
      width: 44px; height: 44px;
      border-radius: 12px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-3);
      transition: background var(--transition), color var(--transition);
    }
    .theme-btn:hover { background: var(--bg-hover); color: var(--text-2); }

    /* ── SCROLLBAR global ── */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* ── EMPTY STATE in chat ── */
    #chatArea .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: var(--text-3);
    }
    #chatArea .empty-state .empty-icon { font-size: 48px; }

    @media (max-width: 700px) {
      .dialogs-panel { width: 100%; }
      .chat-area { display: none; }
      .news-sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<nav class="sidebar">
  <div class="sidebar-logo">💬</div>

  <button class="nav-btn active" id="navMsg" onclick="showPage('messenger')" title="Мессенджер">💬
    <span class="badge"></span>
  </button>
  <button class="nav-btn" id="navNews" onclick="showPage('news')" title="Новости">📰</button>
  <button class="nav-btn" id="navFriends" onclick="showPage('friends')" title="Друзья">👥</button>
  <button class="nav-btn" id="navNotif" onclick="showPage('notif')" title="Уведомления">🔔</button>

  <div class="sidebar-bottom">
    <button class="theme-btn" onclick="cycleTheme()" title="Тема" id="themeBtn">🌙</button>
    <button class="avatar-btn" title="Профиль">СС</button>
  </div>
</nav>

<!-- ══ MESSENGER PAGE ══ -->
<div class="page active" id="pageMessenger">
  <!-- Диалоги -->
  <div class="dialogs-panel">
    <div class="dialogs-header">
      <h2>Сообщения</h2>
      <button class="new-chat-btn" title="Новый чат">＋</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" placeholder="Поиск диалогов..." id="searchInput" oninput="filterDialogs(this.value)"/>
    </div>
    <div class="dialogs-list" id="dialogsList"></div>
  </div>

  <!-- Чат -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <div>Выберите диалог</div>
    </div>
  </div>
</div>

<!-- ══ NEWS PAGE ══ -->
<div class="page" id="pageNews">
  <div class="news-page">
    <aside class="news-sidebar">
      <h3>Лента</h3>
      <div class="news-nav-item active" onclick="setNewsTab(this)"><span>📰</span> Моя лента</div>
      <div class="news-nav-item" onclick="setNewsTab(this)"><span>🔥</span> Популярное</div>
      <div class="news-nav-item" onclick="setNewsTab(this)"><span>⭐</span> Избранное</div>
      <div class="news-nav-item" onclick="setNewsTab(this)"><span>📌</span> Закреплённые</div>

      <h3>Статистика</h3>
      <div class="stats-block">
        <div class="stat-row"><span>Друзья</span><span class="stat-val">124</span></div>
        <div class="stat-row"><span>Подписчики</span><span class="stat-val">89</span></div>
        <div class="stat-row"><span>Фото</span><span class="stat-val">47</span></div>
      </div>

      <h3>Группы</h3>
      <div class="groups-block">
        <div class="group-row"><div class="group-icon">🎮</div><span>Gaming Community</span></div>
        <div class="group-row"><div class="group-icon">💻</div><span>IT News</span></div>
        <div class="group-row"><div class="group-icon">🎵</div><span>Музыкальный клуб</span></div>
        <div class="group-row"><div class="group-icon">📸</div><span>Фотографы</span></div>
      </div>
    </aside>

    <div class="news-feed">
      <div class="feed-topbar">
        <h2>Новости</h2>
        <div class="feed-tabs">
          <button class="feed-tab active">Все</button>
          <button class="feed-tab">Лучшее</button>
          <button class="feed-tab">Подписки</button>
        </div>
      </div>

      <!-- Создать пост -->
      <div class="create-post">
        <div class="create-post-top">
          <div class="post-avatar">СС</div>
          <input class="post-input" placeholder="Что у вас нового, Семён?" id="postInput"/>
        </div>
        <div class="create-post-actions">
          <div class="post-action-btns">
            <button class="post-act-btn">📷 Фото</button>
            <button class="post-act-btn">🎥 Видео</button>
            <button class="post-act-btn">📍 Место</button>
          </div>
          <button class="publish-btn" onclick="publishPost()">Опубликовать</button>
        </div>
      </div>

      <!-- Посты -->
      <div id="feedPosts"></div>
    </div>
  </div>
</div>

<!-- ══ FRIENDS PAGE ══ -->
<div class="page" id="pageFriends">
  <div style="margin:auto;text-align:center;color:var(--text-3);font-size:15px">
    <div style="font-size:48px;margin-bottom:12px">👥</div>
    <div>Раздел «Друзья» в разработке</div>
  </div>
</div>

<!-- ══ NOTIF PAGE ══ -->
<div class="page" id="pageNotif">
  <div style="margin:auto;text-align:center;color:var(--text-3);font-size:15px">
    <div style="font-size:48px;margin-bottom:12px">🔔</div>
    <div>Уведомлений пока нет</div>
  </div>
</div>

<script>
// ── DATA ──
const DIALOGS = [
  { id:1, name:'Анна Петрова', preview:'Хорошо, договорились!', time:'14:32', unread:2, color:'#6C63FF', emoji:'👩' },
  { id:2, name:'Сергей Иванов', preview:'Смотрел новый фильм?', time:'13:10', unread:0, color:'#f43f5e', emoji:'🧑' },
  { id:3, name:'Мария Соколова', preview:'Отправила файл', time:'вчера', unread:5, color:'#10b981', emoji:'👩‍💻' },
  { id:4, name:'Алексей Кузнецов', preview:'Спасибо, помогло!', time:'вчера', unread:0, color:'#f59e0b', emoji:'🧔' },
  { id:5, name:'IT News', preview:'Вышел Python 3.14', time:'пн', unread:12, color:'#3b82f6', emoji:'💻' },
];
const MESSAGES = {
  1: [
    { out:false, text:'Привет! Ты будешь на вечеринке в пятницу?', time:'14:20' },
    { out:true,  text:'Да, конечно! Во сколько начало?', time:'14:25' },
    { out:false, text:'В 19:00, адрес скину чуть позже', time:'14:28' },
    { out:true,  text:'Отлично, жду!', time:'14:30' },
    { out:false, text:'Хорошо, договорились!', time:'14:32' },
  ],
  2: [
    { out:false, text:'Смотрел новый фильм?', time:'13:10' },
    { out:true,  text:'Ещё нет, добавил в список', time:'13:12' },
  ],
  3: [
    { out:false, text:'Отправила файл', time:'вчера' },
  ],
  4: [
    { out:false, text:'Спасибо, помогло!', time:'вчера' },
  ],
  5: [
    { out:false, text:'Вышел Python 3.14 с новыми фичами!', time:'пн' },
    { out:false, text:'Читать полный changelog?', time:'пн' },
  ],
};
const POSTS = [
  { id:1, avatar:'👩', name:'Анна Петрова', time:'2 часа назад', color:'#6C63FF',
    text:'Сегодня был прекрасный день! Прогулка по парку, встретила старых друзей. Как же здорово, когда погода радует ☀️',
    media:'linear-gradient(135deg,#a8c0ff,#3f2b96)', mediaIcon:'🌅', likes:24, comments:7, shares:3, liked:false },
  { id:2, avatar:'🧑', name:'Сергей Иванов', time:'5 часов назад', color:'#f43f5e',
    text:'Запустил новый проект! Наконец-то первая версия готова к тестированию. Буду рад фидбеку от всех желающих 🚀',
    media:'linear-gradient(135deg,#f093fb,#f5576c)', mediaIcon:'💻', likes:15, comments:12, shares:5, liked:false },
  { id:3, avatar:'👩‍💻', name:'Мария Соколова', time:'вчера', color:'#10b981',
    text:'Новая книга просто потрясающая! "Искусство программирования" — must read для всех разработчиков. Уже на 200 странице 📚',
    media:null, mediaIcon:null, likes:32, comments:9, shares:12, liked:true },
];

let activeDialog = null;
let postData = JSON.parse(JSON.stringify(POSTS));

// ── PAGES ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { messenger:'pageMessenger', news:'pageNews', friends:'pageFriends', notif:'pageNotif' };
  const navMap = { messenger:'navMsg', news:'navNews', friends:'navFriends', notif:'navNotif' };
  document.getElementById(map[name]).classList.add('active');
  document.getElementById(navMap[name]).classList.add('active');
}

// ── DIALOGS ──
function renderDialogs(list) {
  const el = document.getElementById('dialogsList');
  el.innerHTML = list.map(d => `
    <div class="dialog-item${activeDialog===d.id?' active':''}" onclick="openDialog(${d.id})">
      <div class="dialog-avatar" style="background:${d.color}">${d.emoji}</div>
      <div class="dialog-info">
        <div class="dialog-name">${d.name}</div>
        <div class="dialog-preview">${d.preview}</div>
      </div>
      <div class="dialog-meta">
        <div class="dialog-time">${d.time}</div>
        ${d.unread ? `<div class="dialog-unread">${d.unread}</div>` : ''}
      </div>
    </div>
  `).join('');
}
function filterDialogs(q) {
  renderDialogs(DIALOGS.filter(d => d.name.toLowerCase().includes(q.toLowerCase())));
}

function openDialog(id) {
  activeDialog = id;
  renderDialogs(DIALOGS);
  const d = DIALOGS.find(x => x.id === id);
  d.unread = 0;
  renderDialogs(DIALOGS);

  const msgs = MESSAGES[id] || [];
  document.getElementById('chatArea').innerHTML = `
    <div class="chat-topbar">
      <div class="chat-topbar-avatar" style="background:${d.color}">${d.emoji}</div>
      <div>
        <div class="chat-topbar-name">${d.name}</div>
        <div class="chat-topbar-status">онлайн</div>
      </div>
      <div class="chat-topbar-actions">
        <button class="icon-btn">🔍</button>
        <button class="icon-btn">📞</button>
        <button class="icon-btn">⋯</button>
      </div>
    </div>
    <div class="chat-messages" id="msgList">
      <div class="msg-day"><span>Сегодня</span></div>
      ${msgs.map(m => renderMsg(m, d)).join('')}
    </div>
    <div class="chat-input-bar">
      <button class="icon-btn">📎</button>
      <input class="msg-input" placeholder="Сообщение..." id="msgInput" onkeydown="if(event.key==='Enter')sendMsg(${id})"/>
      <button class="icon-btn">😊</button>
      <button class="send-btn" onclick="sendMsg(${id})">➤</button>
    </div>
  `;
  const ml = document.getElementById('msgList');
  ml.scrollTop = ml.scrollHeight;
}

function renderMsg(m, d) {
  if (m.out) {
    return `<div class="msg-wrap out">
      <div><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time} ✓✓</div></div>
    </div>`;
  } else {
    return `<div class="msg-wrap in">
      <div class="msg-small-avatar" style="background:${d.color}">${d.emoji}</div>
      <div><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time}</div></div>
    </div>`;
  }
}

function sendMsg(id) {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  const d = DIALOGS.find(x => x.id === id);
  if (!MESSAGES[id]) MESSAGES[id] = [];
  const msg = { out:true, text, time: new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) };
  MESSAGES[id].push(msg);
  d.preview = text;
  const ml = document.getElementById('msgList');
  const div = document.createElement('div');
  div.innerHTML = renderMsg(msg, d);
  ml.appendChild(div.firstElementChild);
  ml.scrollTop = ml.scrollHeight;
  input.value = '';
}

// ── NEWS ──
function renderPosts() {
  document.getElementById('feedPosts').innerHTML = postData.map(p => `
    <div class="post-card" id="post-${p.id}">
      <div class="post-card-header">
        <div class="post-user-info">
          <div class="post-user-avatar" style="background:${p.color}">${p.avatar}</div>
          <div>
            <div class="post-user-name">${p.name}</div>
            <div class="post-time">${p.time}</div>
          </div>
        </div>
        <button class="post-menu-btn">⋯</button>
      </div>
      <div class="post-body">${p.text}</div>
      ${p.media ? `<div class="post-media" style="background:${p.media}">${p.mediaIcon}</div>` : ''}
      <div class="post-footer">
        <button class="react-btn${p.liked?' liked':''}" onclick="toggleLike(${p.id})">
          ${p.liked?'❤️':'🤍'} ${p.likes}
        </button>
        <button class="react-btn">💬 ${p.comments}</button>
        <button class="react-btn">↗️ ${p.shares}</button>
      </div>
    </div>
  `).join('');
}

function toggleLike(id) {
  const p = postData.find(x => x.id === id);
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  renderPosts();
}

function publishPost() {
  const input = document.getElementById('postInput');
  const text = input.value.trim();
  if (!text) return;
  postData.unshift({ id: Date.now(), avatar:'😊', name:'Стариков Семён', time:'только что', color:'#6C63FF',
    text, media:null, mediaIcon:null, likes:0, comments:0, shares:0, liked:false });
  input.value = '';
  renderPosts();
}

function setNewsTab(el) {
  document.querySelectorAll('.news-nav-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}

// ── FEED TABS ──
document.addEventListener('click', e => {
  if (e.target.classList.contains('feed-tab')) {
    document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
  }
});

// ── THEME ──
const themes = ['auto','light','dark'];
const themeIcons = { auto:'🌙', light:'☀️', dark:'🌑' };
let themeIdx = 0;
function cycleTheme() {
  themeIdx = (themeIdx + 1) % themes.length;
  const t = themes[themeIdx];
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = themeIcons[t];
}

// ── INIT ──
renderDialogs(DIALOGS);
renderPosts();
</script>
</body>
</html>
